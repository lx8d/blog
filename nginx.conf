events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name blog.cfngd.top;

        location /host/ {
            proxy_pass https://cp.3v.do/;
            proxy_set_header Host "cp.3v.do";
            proxy_set_header Accept-Encoding "";
            
            sub_filter_once off;
            sub_filter 'https://cp.3v.do' '/host';
            sub_filter 'http://cp.3v.do' '/host';
        }
    }
}
