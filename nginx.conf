#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile        on;
    keepalive_timeout  65;

    # Referer 映射规则
    map $request_uri $custom_referer {
        "~*\.asp"           "https://cp.3v.do/";
        default             $http_referer;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass  https://cp.3v.do;
            
            # 域名替换
            subs_filter  t5.3vftp.vip ftp.ovg.sh;
            subs_filter  t5.3vcdn.vip name.ovg.sh;
            subs_filter  '//cp\.3v\.do' '//blog.cfngd.top' r;
            subs_filter  'https://cp\.3v\.do' 'https://blog.cfngd.top' r;
            subs_filter  'http://cp\.3v\.do' 'https://blog.cfngd.top' r;
          
            # 删除到期日期（使用 GBK 编码解决乱码）
            subs_filter  '2126-09-15' '\xB0\xB4\xB9\xBA\xC2\xF2\xC4\xEA\xCF\xDE\xBC\xC6\xCB\xE3' r;
            
            sub_filter_once off;
            subs_filter_types text/css text/javascript application/javascript application/json;
            
            # 代理头
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           $custom_referer;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  Accept-Encoding   "";
            
            # 重定向和Cookie
            proxy_redirect    https://cp.3v.do/ /;
            proxy_redirect    http://cp.3v.do/ /;
            proxy_cookie_path / /;
            proxy_cookie_domain cp.3v.do localhost;
        }
    }
}
