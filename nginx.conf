#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    # 包含标准 MIME 类型（只包含一次）
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen 80;
        server_name blog.cfngd.top;

        location /host/ {
            proxy_pass https://cp.3v.do/;
            
            # 代理头设置
            proxy_set_header Host "cp.3v.do";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
            
            # 处理重定向
            proxy_redirect https://cp.3v.do/ /host/;
            proxy_redirect http://cp.3v.do/ /host/;
            proxy_redirect ~^https?://cp\.3v\.do/(.*)$ /host/$1;
            
            # 处理 Cookie
            proxy_cookie_path / /host/;
            proxy_cookie_domain cp.3v.do blog.cfngd.top;
            
            # 替换配置 - 注意：sub_filter 可以出现多次
            sub_filter_once off;
            # 指定需要替换的 MIME 类型（避免重复定义 text/html）
            sub_filter_types text/javascript application/javascript text/css;
            
            # 多个 sub_filter 指令
            sub_filter 'https://cp.3v.do' '/host';
            sub_filter 'http://cp.3v.do' '/host';
            sub_filter '="/' '="/host/';
            sub_filter "='" "='/host/";
            sub_filter 'Chkadmin.asp' 'manage.asp?action=login&';
            sub_filter 'action="manage.asp' 'action="manage.asp?action=login&';
            
            # 添加响应头
            add_header X-Proxy-By "Nginx";
        }
    }
}
