#user nobody;
worker_processes 1;
events {
    worker_connections 1024;
}
http {
    include mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    sendfile on;
    keepalive_timeout 65;
    
    # 开启调试日志（临时）
    error_log logs/error.log debug;
    
    # Referer 映射规则
    map $request_uri $custom_referer {
        "~*\.asp" "https://cp.3v.do/";
        default $http_referer;
    }
    
    server {
        listen 80;
        server_name localhost;
        
        location / {
            proxy_pass https://cp.3v.do;
            
            # ========== 调试信息 ==========
            # 添加响应头，查看Content-Type
            add_header X-Debug-Content-Type $upstream_http_content_type always;
            add_header X-Debug-Proxy-Path $uri always;
            
            # ========== 域名替换 ==========
            subs_filter t5.3vftp.vip ftp.ovg.sh;
            subs_filter t5.3vcdn.vip name.ovg.sh;
            subs_filter '//cp\.3v\.do' '//cp.ovg.sh' r;
            subs_filter 'https://cp\.3v\.do' 'https://cp.ovg.sh' r;
            subs_filter 'http://cp\.3v\.do' 'https://cp.ovg.sh' r;
            
            # 删除到期日期
            subs_filter '2126-09-15' '' r;
            
            # ========== 测试1：最简单的替换测试（测试功能是否正常） ==========
            subs_filter '<title>' '<title>【TEST-代理测试】' i;
            
            # ========== 你的目标替换（方式1：精确匹配） ==========
            subs_filter '<table Width="100%" Height="200" Border="0" Cellspacing="0" Cellpadding="0" Align="center">' 
                        '<table Width="100%" Height="200" Border="0" Cellspacing="0" Cellpadding="0" Align="center">\\
<td align="center" colspan="4"><img src="https://host.ovg.sh/images/logo-ico.png" width="50" height="50" border="0">\\
<tr>\\
<td align="center" height="30" colspan="4">&nbsp;\\
</tr>\\
</table>' i;
            
            # ========== 方式2：使用正则匹配（忽略空白字符） ==========
            subs_filter '<table\s+Width="100%"\s+Height="200"\s+Border="0"\s+Cellspacing="0"\s+Cellpadding="0"\s+Align="center">' 
                        '<table Width="100%" Height="200" Border="0" Cellspacing="0" Cellpadding="0" Align="center">\\
<td align="center" colspan="4"><img src="https://host.ovg.sh/images/logo-ico.png" width="50" height="50" border="0">\\
<tr>\\
<td align="center" height="30" colspan="4">&nbsp;\\
</tr>\\
</table>' r;
            
            # ========== 方式3：只替换table的开始标签（最宽松） ==========
            subs_filter '<table[^>]*Width="100%"[^>]*Height="200"[^>]*>' 
                        '<table Width="100%" Height="200" Border="0" Cellspacing="0" Cellpadding="0" Align="center">\\
<td align="center" colspan="4"><img src="https://host.ovg.sh/images/logo-ico.png" width="50" height="50" border="0">\\
<tr>\\
<td align="center" height="30" colspan="4">&nbsp;\\
</tr>\\
</table>' r;
            
            sub_filter_once off;
            
            # 确保处理所有相关类型
            subs_filter_types text/html text/css text/javascript application/javascript application/json;
            
            # ========== 代理头配置 ==========
            proxy_set_header Host "cp.3v.do";
            proxy_set_header Referer $custom_referer;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept-Encoding "";
            
            # ========== 重定向和Cookie ==========
            proxy_redirect https://cp.3v.do/ /;
            proxy_redirect http://cp.3v.do/ /;
            proxy_cookie_path / /;
            proxy_cookie_domain cp.3v.do cp.ovg.sh;
        }
    }
}
