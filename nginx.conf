server {
    listen 80;
    server_name blog.cfngd.top;

    location /host/ {
        # 代理到目标服务器
        proxy_pass https://cp.3v.do/;
        
        # 设置代理头
        proxy_set_header Host "cp.3v.do";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 关键：不压缩响应内容，确保替换生效
        proxy_set_header Accept-Encoding "";
        
        # 使用 sub_filter 替换所有链接
        sub_filter_once off;
        sub_filter_types text/html text/css text/javascript application/javascript;
        
        # 替换域名和路径
        sub_filter 'https://cp.3v.do/' '/host/';
        sub_filter 'http://cp.3v.do/' '/host/';
        sub_filter 'cp.3v.do' 'blog.cfngd.top/host';
        
        # 替换表单 action 路径
        sub_filter 'action="Chkadmin.asp' 'action="manage.asp?action=login&';
        sub_filter 'action=\'Chkadmin.asp' 'action=\'manage.asp?action=login&';
        
        # 替换所有 .asp 链接
        sub_filter 'href="/' 'href="/host/';
        sub_filter 'src="/' 'src="/host/';
        sub_filter 'href="../' 'href="/host/';
        sub_filter 'src="../' 'src="/host/';
        
        # 处理重定向
        proxy_redirect https://cp.3v.do/ /host/;
        proxy_redirect http://cp.3v.do/ /host/;
        proxy_redirect ~^https?://cp\.3v\.do/(.*)$ /host/$1;
        
        # 处理 Cookie 路径
        proxy_cookie_path / /host/;
        proxy_cookie_domain cp.3v.do blog.cfngd.top;
    }
}
