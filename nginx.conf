#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # Referer 映射规则（解决所有 .asp 页面的来源验证问题）
    map $request_uri $custom_referer {
        "~*\.asp"           "https://cp.3v.do/";
        default             $http_referer;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass  https://cp.3v.do;

            # 域名替换规则
            subs_filter  t5.3vftp.vip ftp.ovg.sh;
            subs_filter  t5.3vcdn.vip name.ovg.sh;

# 模板：删除包含特定文字的任意标签
subs_filter '<标签名[^>]*>.*?关键文字.*?</标签名>' '' r;
# 指定属性，更精确
subs_filter '<标签名[^>]*属性名="属性值"[^>]*>.*?关键文字.*?</标签名>' '' r;
# 删除从某个特征到另一个特征的所有内容
subs_filter '开始特征(.*?)结束特征' '' r;    
            
            # 删除到期日期的整个表格行（无视换行和空格）
            subs_filter  '(<tr[^>]*>)\s*<td[^>]*>到期日期:\s*<td[^>]*>2126-09-15\s*</tr>' '' r;
            
            # 字符串只进行一次替换，即只替换第一个被匹配的字符串。这里关闭。
            sub_filter_once off;

            # 代理头设置
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           $custom_referer;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            # 防止返回压缩的内容，因为压缩的内容无法替换字符串
            proxy_set_header  Accept-Encoding   "";
            
            # 处理重定向和Cookie
            proxy_redirect    https://cp.3v.do/ /;
            proxy_redirect    http://cp.3v.do/ /;
            proxy_cookie_path / /;
            proxy_cookie_domain cp.3v.do localhost;
        }
    }
}
