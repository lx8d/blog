#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # 在这里添加 server 块
    server {
        listen 80;
        server_name blog.cfngd.top;

        location /host/ {
            # 代理到目标服务器
            proxy_pass https://cp.3v.do/;
            
            # 代理头设置
            proxy_set_header Host "cp.3v.do";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 关键：禁用压缩，确保替换生效
            proxy_set_header Accept-Encoding "";
            
            # 处理重定向
            proxy_redirect https://cp.3v.do/ /host/;
            proxy_redirect http://cp.3v.do/ /host/;
            proxy_redirect ~^https?://cp\.3v\.do/(.*)$ /host/$1;
            
            # 处理 Cookie 路径
            proxy_cookie_path / /host/;
            proxy_cookie_domain cp.3v.do blog.cfngd.top;
            
            # 字符串替换
            sub_filter_once off;
            sub_filter_types text/html text/javascript application/javascript text/css;
            
            # 替换所有内部链接
            sub_filter 'https://cp.3v.do' '/host';
            sub_filter 'http://cp.3v.do' '/host';
            sub_filter '="/' '="/host/';
            sub_filter "='" "='/host/";
            
            # 特殊处理登录表单
            sub_filter 'Chkadmin.asp' 'manage.asp?action=login&';
            sub_filter 'action="manage.asp' 'action="manage.asp?action=login&';
            
            # 添加调试头（可选）
            add_header X-Proxy-By "Nginx";
        }
    }
}
