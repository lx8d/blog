#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # Referer 映射规则（解决登录问题）
    map $request_uri $custom_referer {
        "~*Chkadmin\.asp"   "https://cp.3v.do/";
        default             $http_referer;
    }

    server {
        listen 80;
        server_name localhost;

location / {
    proxy_pass  https://cp.3v.do;

    # 替换规则
    subs_filter  t5.3vftp.vip ftp.ovg.sh;
    subs_filter  t5.3vcdn.vip name.ovg.sh;
    
    # 删除到期日期（新增）
    subs_filter  '到期日期:	2126-09-15' '';
    # 备选：如果有空格变化的版本
    subs_filter  '到期日期:\s*2126-09-15' '';
    
    # 字符串只进行一次替换，即只替换第一个被匹配的字符串。这里关闭。
    sub_filter_once off;

    # 指定头部
    proxy_set_header  Host              "cp.3v.do";
    proxy_set_header  Referer           $custom_referer;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  User-Agent        $http_user_agent;
    proxy_set_header  Accept-Encoding   "";
}
    }
}
