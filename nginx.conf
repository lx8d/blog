#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass  https://cp.3v.do;
            
            # 原有的替换规则（保留）
            subs_filter  https://dev-lx8d.pantheonsite.io/ /;
            subs_filter  'https://dev-lx8d.pantheonsite.io' '/';
            subs_filter  '//dev-lx8d.pantheonsite.io' '/';
            subs_filter  return-to-pantheon return-lx8d-pantheon;
            
            # ========== 新增：解决登录跳转问题 ==========
            
            # 1. 替换表单提交地址
            subs_filter  'action="Chkadmin.asp'  'action="manage.asp?action=login&';
            subs_filter  "action='Chkadmin.asp"  "action='manage.asp?action=login&";
            
            # 2. 替换所有内部 ASP 链接，确保路径正确
            subs_filter  'href="Chkadmin.asp'   'href="manage.asp?action=login&';
            subs_filter  'href="manage.asp'     'href="manage.asp?action=login&';
            
            # 3. 处理 JavaScript 中的跳转
            subs_filter  'location.href="Chkadmin.asp'  'location.href="manage.asp?action=login&';
            subs_filter  'window.location="Chkadmin.asp' 'window.location="manage.asp?action=login&';
            
            # 4. 处理 POST 提交的 action
            subs_filter  'action="/Chkadmin.asp'   'action="/manage.asp?action=login&';
            subs_filter  'action="./Chkadmin.asp'  'action="./manage.asp?action=login&';
            
            # ========== 字符串替换设置 ==========
            sub_filter_once  off;
            
            # ========== 代理头设置 ==========
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           $http_referer;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            
            # 防止返回压缩内容
            proxy_set_header  Accept-Encoding   "";
            
            # ========== 处理重定向 ==========
            proxy_redirect  https://cp.3v.do/Chkadmin.asp  /manage.asp?action=login&;
            proxy_redirect  http://cp.3v.do/Chkadmin.asp   /manage.asp?action=login&;
            
            # ========== 处理 Cookie 路径 ==========
            proxy_cookie_path  /  /;
        }
    }
}
