#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # 添加 Referer 映射规则（仅新增这部分）
    map $request_uri $custom_referer {
        "~*Chkadmin\.asp"   "https://cp.3v.do/";
        default             $http_referer;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass  https://cp.3v.do;

            # 替换指定字符串（保持不变）
            subs_filter  https://dev-lx8d.pantheonsite.io/ /;
            subs_filter  'https://dev-lx8d.pantheonsite.io' '/';
            subs_filter  '//dev-lx8d.pantheonsite.io' '/';
            subs_filter  return-to-pantheon return-lx8d-pantheon; 
            # 字符串只进行一次替换，即只替换第一个被匹配的字符串。这里关闭。
            sub_filter_once off;

            # 指定头部（只修改 Referer 这一行）
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           $custom_referer;  # 原来这里是 $http_referer，改为 $custom_referer
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  User-Agent        $http_user_agent;
            # 防止谷歌返回压缩的内容，因为压缩的内容无法替换字符串
            proxy_set_header  Accept-Encoding   "";
        }
    }
}
