http {
    # ... 其他配置 ...
    
    # 定义 Referer 映射规则
    map $request_uri $custom_referer {
        "~*Chkadmin\.asp"   "https://cp.3v.do/";
        default             $http_referer;
    }
    
    server {
        listen 80;
        server_name blog.cfngd.top;
        
        location /host/ {
            proxy_pass https://cp.3v.do/;
            
            # 原有替换规则
            subs_filter https://dev-lx8d.pantheonsite.io/ /;
            subs_filter 'https://dev-lx8d.pantheonsite.io' '/';
            subs_filter '//dev-lx8d.pantheonsite.io' '/';
            subs_filter return-to-pantheon return-lx8d-pantheon;
            sub_filter_once off;
            
            # 使用映射后的 Referer
            proxy_set_header Referer $custom_referer;
            proxy_set_header Host "cp.3v.do";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept-Encoding "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # 重定向和 Cookie 处理
            proxy_redirect https://cp.3v.do/ /host/;
            proxy_redirect http://cp.3v.do/ /host/;
            proxy_cookie_path / /host/;
            proxy_cookie_domain cp.3v.do blog.cfngd.top;
        }
    }
}
