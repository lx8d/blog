#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 添加日志以便调试
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # 添加字符集
        charset utf-8;

        location / {
            proxy_pass                          https://cp.3v.do;
            
            # 修改 Host 头部
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  Referer           "https://cp.3v.do/";
            
            # 防止压缩
            proxy_set_header  Accept-Encoding   "";
            
            # SSL 配置
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # 禁用缓存
            proxy_buffering off;
            proxy_cache off;
            
            # 跟随重定向
            proxy_redirect off;
            proxy_redirect https://cp.3v.do/ /;
            
            # 替换字符串（需要安装 ngx_http_substitutions_filter_module）
            sub_filter 'https://dev-lx8d.pantheonsite.io' '';
            sub_filter '//dev-lx8d.pantheonsite.io' '';
            sub_filter_once off;
            sub_filter_types text/html text/css text/javascript application/javascript;
        }
    }
}
