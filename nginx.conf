#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile        on;
    keepalive_timeout  65;

    # Referer 映射规则（解决所有 .asp 页面的来源验证问题）
    map $request_uri $custom_referer {
        "~*\.asp"           "https://cp.3v.do/";
        default             $http_referer;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass  https://cp.3v.do;
            
            # ========== 域名替换规则（通用版）==========
            # 1. 替换旧域名（已失效）
            subs_filter  t5.3vftp.vip ftp.ovg.sh;
            subs_filter  t5.3vcdn.vip name.ovg.sh;
            
            # 2. 替换 cp.3v.do 为 blog.cfngd.top（覆盖所有情况）
            # 协议相对链接: //cp.3v.do
            subs_filter  '//cp\.3v\.do' '//blog.cfngd.top' r;
            # https链接: https://cp.3v.do
            subs_filter  'https://cp\.3v\.do' 'https://blog.cfngd.top' r;
            # http链接: http://cp.3v.do
            subs_filter  'http://cp\.3v\.do' 'https://blog.cfngd.top' r;
            # 纯域名（避免误伤）
            subs_filter  'cp\.3v\.do' 'blog.cfngd.top' r;
            
            # ========== 删除不需要的内容 ==========
            # 删除到期日期的整个表格行
            subs_filter  '(<tr[^>]*>)\s*<td[^>]*>到期日期:\s*<td[^>]*>2126-09-15\s*</tr>' '' r;
            
            # ========== 替换设置 ==========
            sub_filter_once off;
            # 指定需要替换的 MIME 类型（覆盖所有可能类型）
            subs_filter_types text/html text/css text/javascript application/javascript application/json application/xml;
            
            # ========== 代理头设置 ==========
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           $custom_referer;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            # 防止返回压缩的内容
            proxy_set_header  Accept-Encoding   "";
            
            # ========== 处理重定向和Cookie ==========
            proxy_redirect    https://cp.3v.do/ /;
            proxy_redirect    http://cp.3v.do/ /;
            proxy_cookie_path / /;
            proxy_cookie_domain cp.3v.do localhost;
        }
    }
}
