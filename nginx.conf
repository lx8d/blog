#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # 修正 mime.types 路径
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;
    access_log /dev/stdout main;
    error_log /dev/stderr;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass                          https://cp.3v.do;

            # 使用 sub_filter（Nginx 默认支持）
            sub_filter                          'https://dev-lx8d.pantheonsite.io' '';
            sub_filter                          '//dev-lx8d.pantheonsite.io' '';
            sub_filter                          'dev-lx8d.pantheonsite.io' 'cp.3v.do';
            
            # 字符串只进行一次替换，即只替换第一个被匹配的字符串。这里关闭。
            sub_filter_once                     off;
            sub_filter_types                    text/html text/css text/javascript application/javascript application/json;

            # 指定头部：
            proxy_set_header  Host              "cp.3v.do";
            proxy_set_header  Referer           "https://cp.3v.do/";
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  User-Agent        $http_user_agent;
            proxy_set_header  Accept-Encoding   "";
            
            # SSL 配置
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            
            # 处理重定向
            proxy_redirect https://cp.3v.do/ /;
            proxy_redirect http://cp.3v.do/ /;
        }
    }
}
